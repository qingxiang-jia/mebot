<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mebot</title>
  <script>
    (function () {
      if (localStorage.getItem("article-parser-theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface-2: #eef0f4;
      --border: #d5dae3;
      --text: #1a1d27;
      --text-muted: #5c6578;
      --accent: #3b6fd9;
      --accent-hover: #2d5fc7;
      --primary-on-accent: #ffffff;
      --danger: #c53030;
      --danger-hover: #9b2c2c;
      --danger-bg: rgba(197, 48, 48, 0.08);
      --success: #2f855a;
      --radius: 8px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }

    [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3344;
      --text: #e8eaef;
      --text-muted: #9aa3b5;
      --accent: #6c9eff;
      --accent-hover: #8ab4ff;
      --primary-on-accent: #0f1117;
      --danger: #f07178;
      --danger-hover: #ff8a90;
      --danger-bg: rgba(240, 113, 120, 0.12);
      --success: #7fd962;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-right: 8px;
      white-space: nowrap;
    }

    label {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    input[type="text"],
    input[type="date"],
    select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 0.875rem;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
    }

    button {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 6px 14px;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover {
      background: var(--border);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--primary-on-accent);
      font-weight: 600;
    }

    button.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    button.danger {
      color: var(--danger);
      border-color: transparent;
    }

    button.danger:hover {
      background: var(--danger-bg);
      color: var(--danger-hover);
    }

    .header-spacer {
      flex: 1;
    }

    #btn-theme-toggle {
      white-space: nowrap;
    }

    .project-row {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) minmax(320px, 1fr);
      min-height: 0;
      overflow: hidden;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr 1fr;
      }
    }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-header {
      min-height: 49px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .panel-header-action {
      margin-left: auto;
      padding: 4px 8px;
      font-size: 0.75rem;
      font-weight: 400;
      text-transform: none;
      letter-spacing: normal;
    }

    .panel-header-action.icon-action {
      width: 28px;
      height: 28px;
      padding: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .panel-header-action.icon-action + .panel-header-action.icon-action {
      margin-left: 4px;
    }

    .panel-header-action.icon-action svg {
      width: 17px;
      height: 17px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .article-list {
      list-style: none;
      overflow: auto;
      scrollbar-gutter: stable;
      flex: 1;
      min-height: 0;
    }

    .article-list li {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
    }

    .article-list li input[type="checkbox"] {
      flex: 0 0 auto;
      width: 16px;
      margin: 0 0 0 12px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .article-list li button {
      flex: 1;
      text-align: left;
      border: none;
      border-radius: 0;
      padding: 10px 16px;
      background: transparent;
    }

    .article-list li button:hover {
      background: var(--surface-2);
    }

    .article-list li.dragging {
      opacity: 0.45;
    }

    .article-list li.drag-over {
      border-top: 2px solid var(--accent);
    }

    .article-list li button.active {
      background: var(--surface-2);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    .article-title-text {
      font-weight: 500;
      display: block;
      margin-bottom: 2px;
    }

    .article-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .article-content {
      flex: 1;
      overflow: auto;
      scrollbar-gutter: stable;
      min-height: 0;
      padding: 16px 20px;
      font-size: 0.9rem;
      line-height: 1.65;
    }

    .article-content h2,
    .article-content h3,
    .article-content h4 {
      margin: 1em 0 0.5em;
    }

    .article-content p {
      margin-bottom: 0.75em;
    }

    .article-content ul,
    .article-content ol {
      margin: 0.5em 0 0.75em 1.5em;
    }

    .article-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .article-content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 0.75em 0;
    }

    .markdown-preview {
      flex: 1;
      min-height: 200px;
      overflow-y: auto;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3,
    .markdown-preview h4,
    .markdown-preview h5,
    .markdown-preview h6 {
      margin: 0 0 0.5em;
    }

    .markdown-preview p,
    .markdown-preview ul,
    .markdown-preview ol,
    .markdown-preview blockquote,
    .markdown-preview pre {
      margin: 0 0 0.75em;
    }

    .markdown-preview ul,
    .markdown-preview ol {
      padding-left: 1.5em;
    }

    .markdown-preview blockquote {
      border-left: 3px solid var(--border);
      padding-left: 12px;
      color: var(--text-muted);
    }

    .markdown-preview pre {
      overflow-x: auto;
      padding: 10px;
      background: var(--surface);
      border-radius: 4px;
    }

    .summary-raw {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: var(--mono);
    }

    .summary-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      min-height: 0;
    }

    .summary-area label {
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text);
    }

    .summary-area textarea {
      flex: 1;
      min-height: 200px;
      resize: vertical;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 12px;
      font-family: var(--font);
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .summary-area textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 32px;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    #file-input,
    #markdown-file-input {
      display: none;
    }
  </style>
</head>

<body>
  <header>
    <h1>Mebot</h1>
    <div class="project-row">
      <label for="project-select">Project</label>
      <select id="project-select"></select>
      <input type="text" id="project-name" placeholder="Project name" style="width: 160px;">
      <button id="btn-new-project">New</button>
      <button id="btn-rename-project">Rename</button>
      <button id="btn-delete-project" class="danger">Delete</button>
    </div>
    <div class="file-row">
      <button id="btn-import" class="primary">Import HTML files</button>
      <input type="file" id="file-input" accept=".html,.htm,text/html" multiple>
      <button id="btn-import-markdown">Import Markdown</button>
      <input type="file" id="markdown-file-input" accept=".md,text/markdown,text/plain">
      <label for="export-date">Export date</label>
      <input type="date" id="export-date">
      <button id="btn-export" class="primary">Export Markdown</button>
    </div>
    <div class="header-spacer"></div>
    <button id="btn-theme-toggle" type="button" title="Toggle dark mode">Dark mode</button>
  </header>

  <main>
    <section class="panel article-panel">
      <div class="panel-header">
        <span>Articles</span>
        <button id="btn-toggle-selection" class="panel-header-action icon-action" type="button"
          title="Show selection checkboxes" aria-label="Show selection checkboxes">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
            <path d="m8 12 2.5 2.5L16 9"></path>
          </svg>
        </button>
        <button id="btn-copy-titles" class="panel-header-action icon-action" type="button"
          title="Copy titles" aria-label="Copy titles" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 6h14M12 6v13M8 19h8"></path>
          </svg>
        </button>
        <button id="btn-copy-articles" class="panel-header-action icon-action" type="button"
          title="Copy articles" aria-label="Copy articles" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="5" y="3" width="14" height="18" rx="1.5"></rect>
            <path d="M8 8h8M8 12h8M8 16h5"></path>
          </svg>
        </button>
      </div>
      <ul class="article-list" id="article-list"></ul>
    </section>

    <section class="panel">
      <div class="panel-header">
        <span>Article</span>
        <button id="btn-delete-article" class="panel-header-action danger" type="button"
          title="Delete the selected article" hidden>Delete article</button>
      </div>
      <div class="article-content" id="article-content">
        <div class="empty-state">Import HTML files or select an article to view its content.</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <span>Summary</span>
        <button id="btn-summary-mode" class="panel-header-action" type="button" hidden>Show rendered</button>
      </div>
      <div class="summary-area" id="summary-area">
        <div class="empty-state">Select an article to write a summary.</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    /*

     */

    /*
     * This code is heavily based on Arc90's readability.js (1.7.1) script
     * available at: http://code.google.com/p/arc90labs-readability
     */

    /**
     * Public constructor.
     * @param {HTMLDocument} doc     The document to parse.
     * @param {Object}       options The options object.
     */
    function Readability(doc, options) {
      // In some older versions, people passed a URI as the first argument. Cope:
      if (options && options.documentElement) {
        doc = options;
        options = arguments[2];
      } else if (!doc || !doc.documentElement) {
        throw new Error(
          "First argument to Readability constructor should be a document object."
        );
      }
      options = options || {};

      this._doc = doc;
      this._docJSDOMParser = this._doc.firstChild.__JSDOMParser__;
      this._articleTitle = null;
      this._articleByline = null;
      this._articleDir = null;
      this._articleSiteName = null;
      this._attempts = [];
      this._metadata = {};

      // Configurable options
      this._debug = !!options.debug;
      this._maxElemsToParse =
        options.maxElemsToParse || this.DEFAULT_MAX_ELEMS_TO_PARSE;
      this._nbTopCandidates =
        options.nbTopCandidates || this.DEFAULT_N_TOP_CANDIDATES;
      this._charThreshold = options.charThreshold || this.DEFAULT_CHAR_THRESHOLD;
      this._classesToPreserve = this.CLASSES_TO_PRESERVE.concat(
        options.classesToPreserve || []
      );
      this._keepClasses = !!options.keepClasses;
      this._serializer =
        options.serializer ||
        function (el) {
          return el.innerHTML;
        };
      this._disableJSONLD = !!options.disableJSONLD;
      this._allowedVideoRegex = options.allowedVideoRegex || this.REGEXPS.videos;
      this._linkDensityModifier = options.linkDensityModifier || 0;

      // Start with all flags set
      this._flags =
        this.FLAG_STRIP_UNLIKELYS |
        this.FLAG_WEIGHT_CLASSES |
        this.FLAG_CLEAN_CONDITIONALLY;

      // Control whether log messages are sent to the console
      if (this._debug) {
        let logNode = function (node) {
          if (node.nodeType == node.TEXT_NODE) {
            return `${node.nodeName} ("${node.textContent}")`;
          }
          let attrPairs = Array.from(node.attributes || [], function (attr) {
            return `${attr.name}="${attr.value}"`;
          }).join(" ");
          return `<${node.localName} ${attrPairs}>`;
        };
        this.log = function () {
          if (typeof console !== "undefined") {
            let args = Array.from(arguments, arg => {
              if (arg && arg.nodeType == this.ELEMENT_NODE) {
                return logNode(arg);
              }
              return arg;
            });
            args.unshift("Reader: (Readability)");
            // eslint-disable-next-line no-console
            console.log(...args);
          } else if (typeof dump !== "undefined") {
            /* global dump */
            var msg = Array.prototype.map
              .call(arguments, function (x) {
                return x && x.nodeName ? logNode(x) : x;
              })
              .join(" ");
            dump("Reader: (Readability) " + msg + "\n");
          }
        };
      } else {
        this.log = function () { };
      }
    }

    Readability.prototype = {
      FLAG_STRIP_UNLIKELYS: 0x1,
      FLAG_WEIGHT_CLASSES: 0x2,
      FLAG_CLEAN_CONDITIONALLY: 0x4,

      // https://developer.mozilla.org/en-US/docs/Web/API/Node/nodeType
      ELEMENT_NODE: 1,
      TEXT_NODE: 3,

      // Max number of nodes supported by this parser. Default: 0 (no limit)
      DEFAULT_MAX_ELEMS_TO_PARSE: 0,

      // The number of top candidates to consider when analysing how
      // tight the competition is among candidates.
      DEFAULT_N_TOP_CANDIDATES: 5,

      // Element tags to score by default.
      DEFAULT_TAGS_TO_SCORE: "section,h2,h3,h4,h5,h6,p,td,pre"
        .toUpperCase()
        .split(","),

      // The default number of chars an article must have in order to return a result
      DEFAULT_CHAR_THRESHOLD: 500,

      // All of the regular expressions in use within readability.
      // Defined up here so we don't instantiate them repeatedly in loops.
      REGEXPS: {
        // NOTE: These two regular expressions are duplicated in
        // Readability-readerable.js. Please keep both copies in sync.
        unlikelyCandidates:
          /-ad-|ai2html|banner|breadcrumbs|combx|comment|community|cover-wrap|disqus|extra|footer|gdpr|header|legends|menu|related|remark|replies|rss|shoutbox|sidebar|skyscraper|social|sponsor|supplemental|ad-break|agegate|pagination|pager|popup|yom-remote/i,
        okMaybeItsACandidate: /and|article|body|column|content|main|shadow/i,

        positive:
          /article|body|content|entry|hentry|h-entry|main|page|pagination|post|text|blog|story/i,
        negative:
          /-ad-|hidden|^hid$| hid$| hid |^hid |banner|combx|comment|com-|contact|footer|gdpr|masthead|media|meta|outbrain|promo|related|scroll|share|shoutbox|sidebar|skyscraper|sponsor|shopping|tags|widget/i,
        extraneous:
          /print|archive|comment|discuss|e[\-]?mail|share|reply|all|login|sign|single|utility/i,
        byline: /byline|author|dateline|writtenby|p-author/i,
        replaceFonts: /<(\/?)font[^>]*>/gi,
        normalize: /\s{2,}/g,
        videos:
          /\/\/(www\.)?((dailymotion|youtube|youtube-nocookie|player\.vimeo|v\.qq)\.com|(archive|upload\.wikimedia)\.org|player\.twitch\.tv)/i,
        shareElements: /(\b|_)(share|sharedaddy)(\b|_)/i,
        nextLink: /(next|weiter|continue|>([^\|]|$)|»([^\|]|$))/i,
        prevLink: /(prev|earl|old|new|<|«)/i,
        tokenize: /\W+/g,
        whitespace: /^\s*$/,
        hasContent: /\S$/,
        hashUrl: /^#.+/,
        srcsetUrl: /(\S+)(\s+[\d.]+[xw])?(\s*(?:,|$))/g,
        b64DataUrl: /^data:\s*([^\s;,]+)\s*;\s*base64\s*,/i,
        // Commas as used in Latin, Sindhi, Chinese and various other scripts.
        // see: https://en.wikipedia.org/wiki/Comma#Comma_variants
        commas: /\u002C|\u060C|\uFE50|\uFE10|\uFE11|\u2E41|\u2E34|\u2E32|\uFF0C/g,
        // See: https://schema.org/Article
        jsonLdArticleTypes:
          /^Article|AdvertiserContentArticle|NewsArticle|AnalysisNewsArticle|AskPublicNewsArticle|BackgroundNewsArticle|OpinionNewsArticle|ReportageNewsArticle|ReviewNewsArticle|Report|SatiricalArticle|ScholarlyArticle|MedicalScholarlyArticle|SocialMediaPosting|BlogPosting|LiveBlogPosting|DiscussionForumPosting|TechArticle|APIReference$/,
        // used to see if a node's content matches words commonly used for ad blocks or loading indicators
        adWords:
          /^(ad(vertising|vertisement)?|pub(licité)?|werb(ung)?|广告|Реклама|Anuncio)$/iu,
        loadingWords:
          /^((loading|正在加载|Загрузка|chargement|cargando)(…|\.\.\.)?)$/iu,
      },

      UNLIKELY_ROLES: [
        "menu",
        "menubar",
        "complementary",
        "navigation",
        "alert",
        "alertdialog",
        "dialog",
      ],

      DIV_TO_P_ELEMS: new Set([
        "BLOCKQUOTE",
        "DL",
        "DIV",
        "IMG",
        "OL",
        "P",
        "PRE",
        "TABLE",
        "UL",
      ]),

      ALTER_TO_DIV_EXCEPTIONS: ["DIV", "ARTICLE", "SECTION", "P", "OL", "UL"],

      PRESENTATIONAL_ATTRIBUTES: [
        "align",
        "background",
        "bgcolor",
        "border",
        "cellpadding",
        "cellspacing",
        "frame",
        "hspace",
        "rules",
        "style",
        "valign",
        "vspace",
      ],

      DEPRECATED_SIZE_ATTRIBUTE_ELEMS: ["TABLE", "TH", "TD", "HR", "PRE"],

      // The commented out elements qualify as phrasing content but tend to be
      // removed by readability when put into paragraphs, so we ignore them here.
      PHRASING_ELEMS: [
        // "CANVAS", "IFRAME", "SVG", "VIDEO",
        "ABBR",
        "AUDIO",
        "B",
        "BDO",
        "BR",
        "BUTTON",
        "CITE",
        "CODE",
        "DATA",
        "DATALIST",
        "DFN",
        "EM",
        "EMBED",
        "I",
        "IMG",
        "INPUT",
        "KBD",
        "LABEL",
        "MARK",
        "MATH",
        "METER",
        "NOSCRIPT",
        "OBJECT",
        "OUTPUT",
        "PROGRESS",
        "Q",
        "RUBY",
        "SAMP",
        "SCRIPT",
        "SELECT",
        "SMALL",
        "SPAN",
        "STRONG",
        "SUB",
        "SUP",
        "TEXTAREA",
        "TIME",
        "VAR",
        "WBR",
      ],

      // These are the classes that readability sets itself.
      CLASSES_TO_PRESERVE: ["page"],

      // These are the list of HTML entities that need to be escaped.
      HTML_ESCAPE_MAP: {
        lt: "<",
        gt: ">",
        amp: "&",
        quot: '"',
        apos: "'",
      },

      /**
       * Run any post-process modifications to article content as necessary.
       *
       * @param Element
       * @return void

            node.getAttribute("aria-hidden") != "true" ||
            (node.className &&
              node.className.includes &&
              node.className.includes("fallback-image")))
        );
      },

      /**
       * Runs readability.
       *
       * Workflow:
       *  1. Prep the document by removing script tags, css, etc.
       *  2. Build readability's DOM tree.
       *  3. Grab the article content from the current dom tree.
       *  4. Replace the current DOM tree with the new one.
       *  5. Read peacefully.
       *
       * @return void
       **/
      parse() {
        // Avoid parsing too large documents, as per configuration option
        if (this._maxElemsToParse > 0) {
          var numTags = this._doc.getElementsByTagName("*").length;
          if (numTags > this._maxElemsToParse) {
            throw new Error(
              "Aborting parsing document; " + numTags + " elements found"
            );
          }
        }

        // Unwrap image from noscript
        this._unwrapNoscriptImages(this._doc);

        // Extract JSON-LD metadata before removing scripts
        var jsonLd = this._disableJSONLD ? {} : this._getJSONLD(this._doc);

        // Remove script tags from the document.
        this._removeScripts(this._doc);

        this._prepDocument();

        var metadata = this._getArticleMetadata(jsonLd);
        this._metadata = metadata;
        this._articleTitle = metadata.title;

        var articleContent = this._grabArticle();
        if (!articleContent) {
          return null;
        }

        this.log("Grabbed: " + articleContent.innerHTML);

        this._postProcessContent(articleContent);

        // If we haven't found an excerpt in the article's metadata, use the article's
        // first paragraph as the excerpt. This is used for displaying a preview of
        // the article's content.
        if (!metadata.excerpt) {
          var paragraphs = articleContent.getElementsByTagName("p");
          if (paragraphs.length) {
            metadata.excerpt = paragraphs[0].textContent.trim();
          }
        }

        var textContent = articleContent.textContent;
        return {
          title: this._articleTitle,
          byline: metadata.byline || this._articleByline,
          dir: this._articleDir,
          lang: this._articleLang,
          content: this._serializer(articleContent),
          textContent,
          length: textContent.length,
          excerpt: metadata.excerpt,
          siteName: metadata.siteName || this._articleSiteName,
          publishedTime: metadata.publishedTime,
        };
      },
    };

    if (typeof module === "object") {
      /* eslint-disable-next-line no-redeclare */
      /* global module */
      module.exports = Readability;
    }

  </script>

  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "article-parser-data";
      const THEME_KEY = "article-parser-theme";

      /** @typedef {{ id: string, title: string, markdown: string, summary: string, sourceFile: string, parsedAt: number }} Article */
      /** @typedef {{ id: string, name: string, exportDate: string, articles: Article[], selectedArticleId: string|null, selectedArticleIds?: string[], createdAt: number }} Project */
      /** @typedef {{ projects: Record<string, Project>, activeProjectId: string|null }} AppState */

      /** @type {AppState} */
      let state = { projects: {}, activeProjectId: null };
      let summaryMode = "raw";
      let lastSummaryArticleId = null;
      let selectionMode = false;

      const $ = (id) => document.getElementById(id);

      function uid() {
        return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      function todayISO() {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) state = JSON.parse(raw);
        } catch (e) {
          console.warn("Failed to load state", e);
        }
        if (!state.projects) state.projects = {};
        if (state.activeProjectId === undefined) state.activeProjectId = null;
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function activeProject() {
        return state.activeProjectId ? state.projects[state.activeProjectId] : null;
      }

      function getTheme() {
        return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      }

      function applyTheme(theme) {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.removeAttribute("data-theme");
        }
        localStorage.setItem(THEME_KEY, theme);
        const btn = $("btn-theme-toggle");
        if (btn) {
          btn.textContent = theme === "dark" ? "Light mode" : "Dark mode";
          btn.title = theme === "dark" ? "Switch to light mode" : "Switch to dark mode";
        }
      }

      function toggleTheme() {
        applyTheme(getTheme() === "dark" ? "light" : "dark");
      }

      function showToast(msg, isError) {
        const el = $("toast");
        el.textContent = msg;
        el.className = "toast show" + (isError ? " error" : "");
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => el.classList.remove("show"), 2800);
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }

      function slugify(name) {
        return name.trim().toLowerCase()
          .replace(/[^\w\s-]/g, "")
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "") || "project";
      }

      function createProject(name) {
        const id = uid();
        const project = {
          id,
          name: name.trim() || "Untitled",
          exportDate: todayISO(),
          articles: [],
          selectedArticleId: null,
          selectedArticleIds: [],
          createdAt: Date.now(),
        };
        state.projects[id] = project;
        state.activeProjectId = id;
        saveState();
        render();
        showToast(`Created project "${project.name}"`);
      }

      function renameProject() {
        const p = activeProject();
        if (!p) return;
        const name = $("project-name").value.trim();
        if (!name) {
          showToast("Enter a project name", true);
          return;
        }
        p.name = name;
        saveState();
        renderProjectSelect();
        showToast("Project renamed");
      }

      function deleteProject() {
        const p = activeProject();
        if (!p) return;
        if (!confirm(`Delete project "${p.name}" and all its articles?`)) return;
        delete state.projects[p.id];
        const ids = Object.keys(state.projects);
        state.activeProjectId = ids.length ? ids[0] : null;
        saveState();
        render();
        showToast("Project deleted");
      }

      // --- HTML to Markdown ---

      function inlineMarkdown(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          return node.textContent.replace(/\*/g, "\\*").replace(/_/g, "\\_").replace(/`/g, "\\`");
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return "";

        const tag = node.tagName;
        const inner = () => Array.from(node.childNodes).map(inlineMarkdown).join("");

        switch (tag) {
          case "STRONG":
          case "B":
            return `**${inner()}**`;
          case "EM":
          case "I":
            return `*${inner()}*`;
          case "CODE":
            return `\`${node.textContent}\``;
          case "A": {
            const href = node.getAttribute("href") || "";
            const text = inner() || href;
            return href ? `[${text}](${href})` : text;
          }
          case "BR":
            return "\n";
          case "IMG": {
            const alt = node.getAttribute("alt") || "";
            const src = node.getAttribute("src") || "";
            return src ? `![${alt}](${src})` : "";
          }
          default:
            return inner();
        }
      }

      function blockMarkdown(node, lines) {
        if (node.nodeType === Node.TEXT_NODE) {
          const t = node.textContent.trim();
          if (t) lines.push(t);
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;

        const tag = node.tagName;

        if (tag === "H1" || tag === "H2" || tag === "H3" || tag === "H4" || tag === "H5" || tag === "H6") {
          const level = parseInt(tag[1], 10);
          const prefix = "#".repeat(Math.min(level + 1, 6));
          lines.push(`${prefix} ${node.textContent.trim()}`);
          lines.push("");
          return;
        }

        if (tag === "P") {
          const text = Array.from(node.childNodes).map(inlineMarkdown).join("").trim();
          if (text) {
            lines.push(text);
            lines.push("");
          }
          return;
        }

        if (tag === "BLOCKQUOTE") {
          const text = node.textContent.trim().split("\n").map((l) => `> ${l}`).join("\n");
          lines.push(text);
          lines.push("");
          return;
        }

        if (tag === "PRE") {
          const code = node.textContent.replace(/\n$/, "");
          lines.push("```");
          lines.push(code);
          lines.push("```");
          lines.push("");
          return;
        }

        if (tag === "UL" || tag === "OL") {
          const ordered = tag === "OL";
          Array.from(node.children).forEach((li, i) => {
            if (li.tagName === "LI") {
              const prefix = ordered ? `${i + 1}. ` : "- ";
              const text = li.textContent.trim().replace(/\n+/g, " ");
              lines.push(`${prefix}${text}`);
            }
          });
          lines.push("");
          return;
        }

        if (tag === "HR") {
          lines.push("---");
          lines.push("");
          return;
        }

        if (tag === "FIGURE" || tag === "DIV" || tag === "SECTION" || tag === "ARTICLE") {
          Array.from(node.childNodes).forEach((child) => blockMarkdown(child, lines));
          return;
        }

        if (tag === "IMG") {
          lines.push(inlineMarkdown(node));
          lines.push("");
          return;
        }

        Array.from(node.childNodes).forEach((child) => blockMarkdown(child, lines));
      }

      function htmlToMarkdown(html) {
        const doc = new DOMParser().parseFromString(`<div>${html}</div>`, "text/html");
        const root = doc.body.firstChild;
        const lines = [];
        Array.from(root.childNodes).forEach((n) => blockMarkdown(n, lines));
        return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
      }

      function markdownToHtml(markdown) {
        const lines = markdown.split(/\r?\n/);
        const blocks = [];
        let i = 0;

        const inlineHtml = (text) => escapeHtml(text)
          .replace(/`([^`]+)`/g, "<code>$1</code>")
          .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/__([^_]+)__/g, "<strong>$1</strong>")
          .replace(/\*([^*]+)\*/g, "<em>$1</em>")
          .replace(/_([^_]+)_/g, "<em>$1</em>")
          .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (match, label, href) => {
            const safeHref = /^(https?:|mailto:)/i.test(href) ? href : "#";
            return `<a href="${escapeHtml(safeHref)}">${label}</a>`;
          });

        while (i < lines.length) {
          const line = lines[i];
          if (!line.trim()) {
            i++;
            continue;
          }

          if (line.startsWith("```")) {
            const code = [];
            i++;
            while (i < lines.length && !lines[i].startsWith("```")) code.push(lines[i++]);
            if (i < lines.length) i++;
            blocks.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            continue;
          }

          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            blocks.push(`<h${level}>${inlineHtml(heading[2])}</h${level}>`);
            i++;
            continue;
          }

          if (line.startsWith(">")) {
            const quote = [];
            while (i < lines.length && lines[i].startsWith(">")) quote.push(lines[i++].replace(/^>\s?/, ""));
            blocks.push(`<blockquote>${inlineHtml(quote.join("\n"))}</blockquote>`);
            continue;
          }

          const listMatch = line.match(/^\s*(-|\*)\s+(.+)|^\s*\d+\.\s+(.+)/);
          if (listMatch) {
            const ordered = Boolean(listMatch[3]);
            const items = [];
            while (i < lines.length) {
              const item = lines[i].match(ordered ? /^\s*\d+\.\s+(.+)/ : /^\s*[-*]\s+(.+)/);
              if (!item) break;
              items.push(`<li>${inlineHtml(item[1])}</li>`);
              i++;
            }
            blocks.push(`<${ordered ? "ol" : "ul"}>${items.join("")}</${ordered ? "ol" : "ul"}>`);
            continue;
          }

          const paragraph = [];
          while (i < lines.length && lines[i].trim() &&
            !/^#{1,6}\s+/.test(lines[i]) && !lines[i].startsWith(">") &&
            !lines[i].startsWith("```") && !/^\s*(-|\*)\s+/.test(lines[i]) &&
            !/^\s*\d+\.\s+/.test(lines[i])) {
            paragraph.push(lines[i++]);
          }
          blocks.push(`<p>${inlineHtml(paragraph.join("\n")).replace(/\n/g, "<br>")}</p>`);
        }
        return blocks.join("");
      }

      function parseHtmlString(htmlString, sourceFile) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, "text/html");
        const base = sourceFile ? `file://${sourceFile}` : "https://example.com/article";
        const baseEl = doc.createElement("base");
        baseEl.href = base;
        doc.head.appendChild(baseEl);

        const clone = doc.cloneNode(true);
        const reader = new Readability(clone, { charThreshold: 150 });
        const article = reader.parse();
        if (!article) return null;

        const bodyMd = htmlToMarkdown(article.content);
        const markdown = `## ${article.title}\n\n${bodyMd}`.trim();

        return {
          id: uid(),
          title: article.title || sourceFile || "Untitled",
          markdown,
          summary: "",
          sourceFile: sourceFile || "",
          parsedAt: Date.now(),
        };
      }

      async function importFiles(fileList) {
        const project = activeProject();
        if (!project) {
          showToast("Create or select a project first", true);
          return;
        }

        // FileList is live in some browsers, so snapshot it before any async work.
        // Parse the complete batch before changing project state; otherwise a
        // second import can render/save an intermediate state and overwrite the
        // articles from the first batch.
        const files = Array.from(fileList);
        const results = await Promise.all(files.map(async (file) => {
          try {
            const text = await file.text();
            return parseHtmlString(text, file.name);
          } catch (e) {
            console.error(e);
            return null;
          }
        }));

        const articles = results.filter(Boolean);
        const failed = results.length - articles.length;
        project.articles.push(...articles);
        if (!project.selectedArticleId && articles.length) {
          project.selectedArticleId = articles[0].id;
        }

        saveState();
        render();

        if (articles.length && failed) showToast(`Added ${articles.length} article(s), ${failed} failed`);
        else if (articles.length) showToast(`Added ${articles.length} article(s)`);
        else showToast("Could not parse any files", true);
      }

      function parseExportedMarkdown(text) {
        const fullTextStart = text.search(/^# Full Text\s*$/m);
        const summaryStart = text.search(/^# Summary\s*$/m);
        if (fullTextStart === -1 || summaryStart === -1 || summaryStart <= fullTextStart) return [];

        const sectionList = (sectionText) => {
          const lines = sectionText.split(/\r?\n/);
          const sections = [];
          let current = null;
          for (const line of lines) {
            const heading = line.match(/^##(?!#)\s+(.+?)\s*$/);
            if (heading) {
              if (current) current.body = current.body.join("\n").trim();
              current = { title: heading[1].trim(), body: [] };
              sections.push(current);
            } else if (current) {
              current.body.push(line);
            }
          }
          if (current) current.body = current.body.join("\n").trim();
          return sections;
        };

        const fullText = text.slice(fullTextStart, summaryStart).replace(/^# Full Text\s*\r?\n/m, "");
        const summaries = text.slice(summaryStart).replace(/^# Summary\s*\r?\n/m, "");
        const summaryByTitle = new Map(sectionList(summaries).map((section) => [section.title, section.body]));
        const articles = sectionList(fullText);

        return articles.map((article) => ({
          id: uid(),
          title: article.title,
          markdown: `## ${article.title}\n\n${article.body}`.trim(),
          summary: summaryByTitle.get(article.title) === "_No summary._" ? "" : (summaryByTitle.get(article.title) || ""),
          sourceFile: "imported Markdown",
          parsedAt: Date.now(),
        }));
      }

      async function importMarkdownFile(file) {
        const project = activeProject();
        if (!project) {
          showToast("Create or select a project first", true);
          return;
        }
        try {
          const articles = parseExportedMarkdown(await file.text());
          if (!articles.length) {
            showToast("That file is not a Mebot Markdown export", true);
            return;
          }
          project.articles.push(...articles);
          if (!project.selectedArticleId) project.selectedArticleId = articles[0].id;
          saveState();
          render();
          showToast(`Loaded ${articles.length} article(s) from Markdown`);
        } catch (e) {
          console.error(e);
          showToast("Could not read the Markdown file", true);
        }
      }

      function removeArticle() {
        const project = activeProject();
        if (!project || !project.selectedArticleId) return;
        const idx = project.articles.findIndex((a) => a.id === project.selectedArticleId);
        if (idx === -1) return;
        if (!confirm(`Remove "${project.articles[idx].title}"?`)) return;
        project.articles.splice(idx, 1);
        if (Array.isArray(project.selectedArticleIds)) {
          project.selectedArticleIds = project.selectedArticleIds.filter((id) => id !== project.selectedArticleId);
        }
        project.selectedArticleId = project.articles.length ? project.articles[0].id : null;
        saveState();
        render();
        showToast("Article removed");
      }

      function checkedArticles(project) {
        const selectedIds = new Set(Array.isArray(project.selectedArticleIds) ? project.selectedArticleIds : []);
        const selected = project.articles.filter((article) => selectedIds.has(article.id));
        return selected.length ? selected : project.articles;
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (e) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.style.position = "fixed";
          textarea.style.opacity = "0";
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
      }

      async function copyArticleTitles() {
        const project = activeProject();
        if (!project || !project.articles.length) return;

        // Keep every title on one line, even if a parser returns a title with line breaks.
        const articles = checkedArticles(project);
        const titles = articles
          .map((article) => article.title.replace(/[\r\n]+/g, " ").trim())
          .join("\n");

        await copyText(titles);
        showToast(`Copied ${articles.length} article title(s)`);
      }

      async function copyArticles() {
        const project = activeProject();
        if (!project || !project.articles.length) return;

        const articles = checkedArticles(project);
        await copyText(articles.map((article) => article.markdown).join("\n\n"));
        showToast(`Copied ${articles.length} article(s)`);
      }

      function buildExportMarkdown(project) {
        const parts = ["# Full Text", ""];

        for (const article of project.articles) {
          parts.push(article.markdown);
          parts.push("");
        }

        parts.push("# Summary", "");

        for (const article of project.articles) {
          parts.push(`## ${article.title}`);
          parts.push("");
          parts.push(article.summary.trim() || "_No summary._");
          parts.push("");
        }

        return parts.join("\n").trim() + "\n";
      }

      function exportMarkdown() {
        const project = activeProject();
        if (!project) {
          showToast("No project selected", true);
          return;
        }
        if (!project.articles.length) {
          showToast("No articles to export", true);
          return;
        }

        const date = $("export-date").value || project.exportDate || todayISO();
        project.exportDate = date;
        saveState();

        const md = buildExportMarkdown(project);
        const filename = `${slugify(project.name)}-${date}.md`;
        const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`Exported ${filename}`);
      }

      function renderProjectSelect() {
        const sel = $("project-select");
        sel.innerHTML = "";
        const ids = Object.values(state.projects).sort((a, b) => a.createdAt - b.createdAt);

        if (!ids.length) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "No projects";
          sel.appendChild(opt);
          $("project-name").value = "";
          return;
        }

        for (const p of ids) {
          const opt = document.createElement("option");
          opt.value = p.id;
          opt.textContent = p.name;
          if (p.id === state.activeProjectId) opt.selected = true;
          sel.appendChild(opt);
        }

        const active = activeProject();
        $("project-name").value = active ? active.name : "";
        $("export-date").value = active ? active.exportDate || todayISO() : todayISO();
      }

      function renderArticleList() {
        const list = $("article-list");
        list.innerHTML = "";
        const project = activeProject();
        const copyButton = $("btn-copy-titles");
        const copyArticlesButton = $("btn-copy-articles");
        const selectionButton = $("btn-toggle-selection");
        copyButton.disabled = !project || !project.articles.length;
        copyArticlesButton.disabled = !project || !project.articles.length;
        selectionButton.title = selectionMode ? "Hide selection checkboxes" : "Show selection checkboxes";
        selectionButton.setAttribute("aria-label", selectionButton.title);

        if (!project || !project.articles.length) {
          const li = document.createElement("li");
          li.innerHTML = '<div class="empty-state" style="padding:16px">No articles yet.</div>';
          list.appendChild(li);
          return;
        }

        let draggedArticleId = null;

        for (const article of project.articles) {
          const li = document.createElement("li");
          li.draggable = true;
          let checkbox = null;
          if (selectionMode) {
            checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = Array.isArray(project.selectedArticleIds) && project.selectedArticleIds.includes(article.id);
            checkbox.title = "Select article for copying";
            checkbox.setAttribute("aria-label", `Select ${article.title} for copying`);

            checkbox.addEventListener("click", (e) => e.stopPropagation());
            checkbox.addEventListener("change", () => {
              if (!Array.isArray(project.selectedArticleIds)) project.selectedArticleIds = [];
              if (checkbox.checked) {
                if (!project.selectedArticleIds.includes(article.id)) project.selectedArticleIds.push(article.id);
              } else {
                project.selectedArticleIds = project.selectedArticleIds.filter((id) => id !== article.id);
              }
              saveState();
            });
          }

          const btn = document.createElement("button");
          btn.type = "button";
          if (article.id === project.selectedArticleId) btn.classList.add("active");

          const date = new Date(article.parsedAt).toLocaleDateString();
          btn.innerHTML =
            `<span class="article-title-text">${escapeHtml(article.title)}</span>` +
            `<span class="article-meta">${escapeHtml(article.sourceFile || "imported")} · ${date}</span>`;

          btn.addEventListener("click", () => {
            project.selectedArticleId = article.id;
            saveState();
            render();
          });

          li.addEventListener("dragstart", (e) => {
            draggedArticleId = article.id;
            li.classList.add("dragging");
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", article.id);
          });

          li.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            if (draggedArticleId !== article.id) li.classList.add("drag-over");
          });

          li.addEventListener("dragleave", () => li.classList.remove("drag-over"));

          li.addEventListener("drop", (e) => {
            e.preventDefault();
            const sourceId = draggedArticleId || e.dataTransfer.getData("text/plain");
            const fromIndex = project.articles.findIndex((a) => a.id === sourceId);
            let toIndex = project.articles.findIndex((a) => a.id === article.id);
            if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) return;

            const [moved] = project.articles.splice(fromIndex, 1);
            if (fromIndex < toIndex) toIndex--;
            project.articles.splice(toIndex, 0, moved);
            saveState();
            render();
            showToast("Article order updated");
          });

          li.addEventListener("dragend", () => {
            draggedArticleId = null;
            li.classList.remove("dragging", "drag-over");
          });

          if (checkbox) li.appendChild(checkbox);
          li.appendChild(btn);
          list.appendChild(li);
        }
      }

      function renderArticleContent() {
        const el = $("article-content");
        const project = activeProject();
        const article = project?.articles.find((a) => a.id === project.selectedArticleId);
        $("btn-delete-article").hidden = !article;

        if (!article) {
          el.innerHTML = '<div class="empty-state">Import HTML files or select an article to view its content.</div>';
          return;
        }

        const previewHtml = article.markdown
          .replace(/^## .+\n+/m, "")
          .split("\n\n")
          .map((block) => {
            block = block.trim();
            if (!block) return "";
            if (block.startsWith("#")) {
              const m = block.match(/^(#{1,6})\s+(.+)/);
              if (m) return `<h${m[1].length + 1}>${escapeHtml(m[2])}</h${m[1].length + 1}>`;
            }
            if (block.startsWith("```")) {
              const code = block.replace(/^```\n?/, "").replace(/\n?```$/, "");
              return `<pre><code>${escapeHtml(code)}</code></pre>`;
            }
            if (block.startsWith(">")) {
              return `<blockquote>${escapeHtml(block.replace(/^>\s?/gm, ""))}</blockquote>`;
            }
            if (block.startsWith("- ") || /^\d+\.\s/.test(block)) {
              const items = block.split("\n").map((l) => `<li>${escapeHtml(l.replace(/^(-|\d+\.)\s/, ""))}</li>`).join("");
              return block.startsWith("- ") ? `<ul>${items}</ul>` : `<ol>${items}</ol>`;
            }
            return `<p>${escapeHtml(block).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\*(.+?)\*/g, "<em>$1</em>")}</p>`;
          })
          .join("");

        el.innerHTML = `<h2 style="margin-bottom:12px">${escapeHtml(article.title)}</h2>${previewHtml}`;
      }

      function renderSummary() {
        const area = $("summary-area");
        const project = activeProject();
        const article = project?.articles.find((a) => a.id === project.selectedArticleId);
        const modeButton = $("btn-summary-mode");

        if (!article) {
          area.innerHTML = '<div class="empty-state">Select an article to write a summary.</div>';
          modeButton.hidden = true;
          lastSummaryArticleId = null;
          return;
        }

        if (article.id !== lastSummaryArticleId) {
          summaryMode = (article.summary || "").trim() ? "rendered" : "raw";
          lastSummaryArticleId = article.id;
        }

        modeButton.hidden = false;
        modeButton.textContent = summaryMode === "raw" ? "Show rendered" : "Show raw";
        modeButton.title = summaryMode === "raw" ? "Render the summary as Markdown" : "Show the summary as plain text";
        const summary = article.summary || "";

        if (summaryMode === "raw") {
          area.innerHTML =
            `<label for="summary-input">Summary for: ${escapeHtml(article.title)}</label>` +
            `<textarea id="summary-input" placeholder="Write a summary for this article…">${escapeHtml(summary)}</textarea>`;

          const ta = $("summary-input");
          ta.addEventListener("input", () => {
            article.summary = ta.value;
            saveState();
          });
        } else {
          area.innerHTML =
            `<label id="summary-preview-label">Rendered summary for: ${escapeHtml(article.title)}</label>` +
            `<div class="markdown-preview" aria-labelledby="summary-preview-label">${markdownToHtml(summary) || '<span style="color:var(--text-muted)">No summary yet.</span>'}</div>`;
        }
      }

      function render() {
        renderProjectSelect();
        renderArticleList();
        renderArticleContent();
        renderSummary();
      }

      function bindEvents() {
        $("btn-new-project").addEventListener("click", () => {
          const name = $("project-name").value.trim() || "New Project";
          createProject(name);
        });

        $("btn-rename-project").addEventListener("click", renameProject);

        $("btn-delete-project").addEventListener("click", deleteProject);

        $("project-select").addEventListener("change", (e) => {
          state.activeProjectId = e.target.value || null;
          saveState();
          render();
        });

        $("export-date").addEventListener("change", (e) => {
          const p = activeProject();
          if (p) {
            p.exportDate = e.target.value;
            saveState();
          }
        });

        $("btn-import").addEventListener("click", () => $("file-input").click());

        $("btn-import-markdown").addEventListener("click", () => $("markdown-file-input").click());

        $("file-input").addEventListener("change", (e) => {
          if (e.target.files?.length) importFiles(e.target.files);
          e.target.value = "";
        });

        $("markdown-file-input").addEventListener("change", (e) => {
          if (e.target.files?.length) importMarkdownFile(e.target.files[0]);
          e.target.value = "";
        });

        $("btn-export").addEventListener("click", exportMarkdown);

        $("btn-toggle-selection").addEventListener("click", () => {
          selectionMode = !selectionMode;
          renderArticleList();
        });

        $("btn-copy-titles").addEventListener("click", copyArticleTitles);

        $("btn-copy-articles").addEventListener("click", copyArticles);

        $("btn-delete-article").addEventListener("click", removeArticle);

        $("btn-summary-mode").addEventListener("click", () => {
          summaryMode = summaryMode === "raw" ? "rendered" : "raw";
          renderSummary();
        });

        $("btn-theme-toggle").addEventListener("click", toggleTheme);
      }

      applyTheme(localStorage.getItem(THEME_KEY) === "dark" ? "dark" : "light");

      loadState();

      if (!Object.keys(state.projects).length) {
        createProject("Default Project");
      } else if (!state.activeProjectId || !state.projects[state.activeProjectId]) {
        state.activeProjectId = Object.keys(state.projects)[0];
        saveState();
      }

      bindEvents();
      render();
    })();
  </script>
</body>

</html>
